<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Formulario Crear Cuenta</title>
</head>

<body>
    <article class="contenedor">
        <div class="card">
            <div class="lado-izquierdo">
                <div class="portada">
                    <img src="img/cruz-de-asturias.svg">
                    <h1>Bienvenido</h>
                </div>
            </div>
            <div class="lado-derecho">
                <form id="formulario">
                    <section>
                        <h1>Crea una Nueva Cuenta</h1>
                    </section>
                    <section class="datos">
                        <h2>Nombre</h2>
                        <input id="nombre" type="text">
                        <span id="error-nombre" class="error"></span>
                        <h2>Apellido</h2>
                        <input id="apellido" type="text">
                        <span id="error-apellido" class="error"></span>
                        <h2>(Segundo Apellido)</h2>
                        <input id="segundo-apellido" type="text">
                        <h2>Fecha de nacimiento</h2>
                        <input id="fecha" type="date">
                        <span id="error-fecha" class="error"></span>
                    </section>
                    <section class="credenciales">
                        <h2>Correo Electrónico</h2>
                        <input id="correo" type="email">
                        <span id="error-correo" class="error"></span>
                        <h2>Nueva Contraseña</h2>
                        <input id="password" type="password">
                        <span id="error-password" class="error"></span>
                        <h2>Repite la Contraseña</h2>
                        <input id="repetir-password" type="password">
                        <span id="error-repetir-password"></span>
                    </section>
                    <section>
                        <button type="submit">Crear cuenta</button>
                    </section>
                </form>
            </div>
        </div>
    </article>

    <script>
        const formulario = document.getElementById("formulario");

        // Función para validar campos obligatorios
        function validarCamposObligatorios(campos) {
            for (const campo in campos) {
                if (!campos.nombre) {
                    document.getElementById("error-nombre").innerHTML = '<span class="error">⚠ El nombre es obligatorio.</span>';
                }
                if (!campos[campo]) {

                    alert("Todos los campos son obligatorios...");
                    return false;
                }
            }
            return true;
        }

        // Función para validar fecha de nacimiento
        function validarFechaNacimiento(fecha) {
            const fechaNacimiento = new Date(fecha);
            const hoy = new Date();
            hoy.setHours(0, 0, 0, 0);

            if (fechaNacimiento > hoy) {
                alert("La fecha de nacimiento no puede ser futura...");
                return false;
            }

            let edad = hoy.getFullYear() - fechaNacimiento.getFullYear();
            const mes = hoy.getMonth() - fechaNacimiento.getMonth();
            if (mes < 0 || (mes === 0 && hoy.getDate() < fechaNacimiento.getDate())) {
                edad--;
            }

            if (edad < 18) {
                alert("Debes ser mayor de edad (mínimo 18 años)...");
                return false;
            }

            return true;
        }

        // Función para validar correo
        function validarCorreo(correo) {
            const formatoCorreo = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;
            if (!formatoCorreo.test(correo)) {
                alert("El formato del correo electrónico no es válido...");
                return false;
            }
            return true;
        }

        // Función para validar contraseña
        function validarContraseña(password, repetirPassword) {
            if (password.length < 8) {
                alert("La contraseña debe tener al menos 8 caracteres...");
                return false;
            }
            if (password !== repetirPassword) {
                alert("Las contraseñas no coinciden...");
                return false;
            }
            return true;
        }

        // Evento submit
        formulario.addEventListener("submit", function (e) {
            e.preventDefault();

            const nombre = document.getElementById("nombre").value.trim();
            const apellido = document.getElementById("apellido").value.trim();
            const segundoApellido = document.getElementById("segundo-apellido").value.trim();
            const fecha = document.getElementById("fecha").value;
            const correo = document.getElementById("correo").value.trim();
            const password = document.getElementById("password").value.trim();
            const repetirPassword = document.getElementById("repetir-password").value.trim();

            const campos = { nombre, apellido, fecha, correo, password, repetirPassword };

            if (!validarCamposObligatorios(campos)) return;
            if (!validarFechaNacimiento(fecha)) return;
            if (!validarCorreo(correo)) return;
            if (!validarContraseña(password, repetirPassword)) return;

            alert("Formulario enviado correctamente...");
            formulario.submit();
        });
    </script>
</body>

</html>
