<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Formulario Crear Cuenta</title>
</head>

<body>
    
    <article class="contenedor">
        <button type="button" onclick="botonVolver()">Volver</button>
        <div class="card">
            <div class="lado-izquierdo">
                <div class="portada">
                    <img src="img/cruz-de-asturias.svg">
                    <h1>Bienvenido</h1>
                </div>
            </div>
            <div class="lado-derecho">
                <form id="formulario">
                    <section>
                        <h1>Crea una Nueva Cuenta</h1>
                    </section>
                    <section class="datos">
                        <h2>Nombre</h2>
                        <input id="nombre" type="text">
                        <span id="error-nombre" class="error"></span>
                        <h2>Apellido</h2>
                        <input id="apellido" type="text">
                        <span id="error-apellido" class="error"></span>
                        <h2>(Segundo Apellido)</h2>
                        <input id="segundo-apellido" type="text">
                        <h2>Fecha de nacimiento</h2>
                        <input id="fecha" type="date">
                        <span id="error-fecha" class="error"></span>
                    </section>
                    <section class="credenciales">
                        <h2>Correo Electrónico</h2>
                        <input id="correo" type="email">
                        <span id="error-correo" class="error"></span>
                        <h2>Nueva Contraseña</h2>
                        <input id="password" type="password">
                        <span id="error-password" class="error"></span>
                        <h2>Repite la Contraseña</h2>
                        <input id="repetir-password" type="password">
                        <span id="error-repetir-password" class="error"></span>
                    </section>
                    <section>
                        <button type="submit">Crear cuenta</button>
                    </section>
                </form>
            </div>
        </div>
    </article>

    <script>
        // Boton para volver
        function botonVolver(){
            window.location.href="";
        }

        const formulario = document.getElementById("formulario");

        // Limpiar errores declarados
        function limpiarErrores() {
            document.getElementById("error-nombre").innerHTML = "";
            document.getElementById("error-apellido").innerHTML = "";
            document.getElementById("error-fecha").innerHTML = "";
            document.getElementById("error-correo").innerHTML = "";
            document.getElementById("error-password").innerHTML = "";
            document.getElementById("error-repetir-password").innerHTML = "";
        }

        // Campos obligatorios
        function validarCamposObligatorios(campos) {
            let valido = true;

            if (!campos.nombre) {
                document.getElementById("error-nombre").innerHTML = "⚠ El nombre es obligatorio.";
                valido = false;
            }

            if (!campos.apellido) {
                document.getElementById("error-apellido").innerHTML = "⚠ El apellido es obligatorio.";
                valido = false;
            }

            if (!campos.fecha) {
                document.getElementById("error-fecha").innerHTML = "⚠ La fecha de nacimiento es obligatoria.";
                valido = false;
            }

            if (!campos.correo) {
                document.getElementById("error-correo").innerHTML = "⚠ El correo es obligatorio.";
                valido = false;
            }

            if (!campos.password) {
                document.getElementById("error-password").innerHTML = "⚠ La contraseña es obligatoria.";
                valido = false;
            }

            if (!campos.repetirPassword) {
                document.getElementById("error-repetir-password").innerHTML = "⚠ Debes repetir la contraseña.";
                valido = false;
            }

            return valido;
        }

        // Fecha
        function validarFechaNacimiento(fecha) {
            const fechaNacimiento = new Date(fecha);
            const hoy = new Date();

            if (fechaNacimiento > hoy) {
                document.getElementById("error-fecha").innerHTML = "⚠ La fecha no puede ser futura.";
                return false;
            }

            let edad = hoy.getFullYear() - fechaNacimiento.getFullYear();
            const mes = hoy.getMonth() - fechaNacimiento.getMonth();

            if (mes < 0 || (mes === 0 && hoy.getDate() < fechaNacimiento.getDate())) {
                edad--;
            }

            if (edad < 18) {
                document.getElementById("error-fecha").innerHTML = "⚠ Debes tener mínimo 18 años.";
                return false;
            }

            return true;
        }

        // Correo
        function validarCorreo(correo) {
            const expresion = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;

            if (!expresion.test(correo)) {
                document.getElementById("error-correo").innerHTML = "⚠ Correo no válido.";
                return false;
            }

            return true;
        }

        // Contraseña
        function validarPassword(password) {
            if (password.length < 8) {
                document.getElementById("error-password").innerHTML = "⚠ Debe tener mínimo 8 caracteres.";
                return false;
            }

            return true;
        }

        // Coincidencia de contraseñas
        function validarRepetirPassword(password, repetirPassword) {
            if (password !== repetirPassword) {
                document.getElementById("error-repetir-password").innerHTML = "⚠ Las contraseñas no coinciden.";
                return false;
            }

            return true;
        }

        // Formulario
        formulario.addEventListener("submit", function (e) {

            e.preventDefault();
            limpiarErrores();

            const nombre = document.getElementById("nombre").value.trim();
            const apellido = document.getElementById("apellido").value.trim();
            const fecha = document.getElementById("fecha").value;
            const correo = document.getElementById("correo").value.trim();
            const password = document.getElementById("password").value.trim();
            const repetirPassword = document.getElementById("repetir-password").value.trim();

            const campos = { nombre, apellido, fecha, correo, password, repetirPassword };

            let formularioValido = true;

            if (!validarCamposObligatorios(campos)) formularioValido = false;
            if (fecha && !validarFechaNacimiento(fecha)) formularioValido = false;
            if (correo && !validarCorreo(correo)) formularioValido = false;
            if (password && !validarPassword(password)) formularioValido = false;
            if (password && repetirPassword && !validarRepetirPassword(password, repetirPassword)) formularioValido = false;

            if (formularioValido) {
                alert("¡Se ha creado correctamente la cuenta de " + nombre + " " + apellido + "!");
                document.body.style.backgroundColor = "lightgreen";
            }

            /*
                if (formularioValido) {
                    alert("¡Formulario creado con éxito!");
                    formulario.submit();
                }
                */

            // SE OMITIO EL SUBMIT DEL BOTON PARA PINTAR LA PAGINA DE VERDE

        });

    </script>
</body>

</html>
